services:
  # Web Service
  - type: web
    name: elite-wealth-capital
    runtime: docker
    plan: standard
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: elite-wealth-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elite-wealth-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false  # Set manually in Render dashboard
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        sync: false  # Set manually for SendGrid
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: True
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false

  # Background Worker for Celery
  - type: worker
    name: elite-wealth-worker
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "celery -A elite_wealth_capital worker --loglevel=info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false  # Share from web service
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: elite-wealth-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elite-wealth-redis
          property: connectionString

  # Celery Beat (for scheduled tasks)
  - type: worker
    name: elite-wealth-beat
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "celery -A elite_wealth_capital beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false  # Share from web service
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: elite-wealth-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: elite-wealth-redis
          property: connectionString

databases:
  - name: elite-wealth-db
    plan: free
    databaseName: elite_wealth_db
    user: elite_wealth_user

# Redis for Celery (Paid plan required)
redis:
  - name: elite-wealth-redis
    plan: standard
